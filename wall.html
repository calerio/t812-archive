<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>T812 · Memory Wall</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="site-nav">
    <a class="brand" href="index.html">T812</a>
    <a class="navlink" href="index.html">Gallery</a>
    <a class="navlink active" href="wall.html">Memory Wall</a>
    <a class="navlink" href="originals.html">Originals</a>
  </nav>

  <header class="hero">
    <h1>Memory Wall</h1>
    <p class="tagline">leave a little note for T812</p>
  </header>

  <section class="panel">
    <h2>Add to the wall</h2>
    <form class="memform" id="wallForm">
      <input type="text" name="name" placeholder="your name (optional)" maxlength="80" autocomplete="off" />
      <textarea name="message" placeholder="a memory, a thank-you, a hello…" maxlength="1000" required></textarea>
      <input class="hp" type="text" name="website" tabindex="-1" autocomplete="off" aria-hidden="true" />
      <button type="submit">Pin to the wall</button>
      <span class="formnote" id="wallFormNote"></span>
    </form>
  </section>

  <section id="wall" class="wall"></section>

  <footer class="footer"><p><span id="meta"></span></p></footer>

  <script src="config.js"></script>
  <script src="js/supa.js"></script>
  <script src="wall.js"></script>
</body>
</html>
