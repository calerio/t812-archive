<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>T812 · The Flat Archive</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="site-nav">
    <a class="brand" href="index.html">T812</a>
    <a class="navlink active" href="index.html">Gallery</a>
    <a class="navlink" href="wall.html">Memory Wall</a>
    <a class="navlink" href="originals.html">Originals</a>
  </nav>

  <header class="hero">
    <h1>T812</h1>
    <p class="tagline">a living archive of the flat — polaroids, letters &amp; memories</p>
  </header>

  <!-- chapter shelf -->
  <section id="shelf" class="shelf"></section>

  <!-- a single collection's photos -->
  <section id="collection" hidden>
    <div class="filters"><button id="backToShelf">← all chapters</button></div>
    <div id="gallery" class="gallery"></div>
  </section>

  <footer class="footer">
    <p>Add your own — see <code>CONTRIBUTING.md</code>. <span id="meta"></span></p>
  </footer>

  <!-- photo lightbox -->
  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox__close" id="lightboxClose" aria-label="Close">&times;</button>
    <div class="lightbox__panel">
      <div class="lightbox__media" id="lbMedia"></div>
      <div class="lightbox__side">
        <h2 id="lbTitle"></h2>
        <div class="meta" id="lbMeta"></div>
        <div class="orig" id="lbOrig"></div>
        <div class="notes">
          <h3>Memories on this photo</h3>
          <div id="lbNotes"></div>
          <form class="memform" id="lbForm">
            <input type="text" name="name" placeholder="your name (optional)" maxlength="80" autocomplete="off" />
            <textarea name="message" placeholder="leave a little memory…" maxlength="1000" required></textarea>
            <input class="hp" type="text" name="website" tabindex="-1" autocomplete="off" aria-hidden="true" />
            <button type="submit">Pin it</button>
            <span class="formnote" id="lbFormNote"></span>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- original scan viewer -->
  <div class="lightbox" id="origbox" hidden>
    <button class="lightbox__close" id="origClose" aria-label="Close">&times;</button>
    <div class="lightbox__media" style="background:transparent">
      <img id="origImg" alt="original scan" />
    </div>
  </div>

  <script src="config.js"></script>
  <script src="js/supa.js"></script>
  <script src="app.js"></script>
</body>
</html>
